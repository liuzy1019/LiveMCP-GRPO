# SchemaShift-GRPO（Direct）：直接 GRPO（无 SFT 冷启动），扰动数据 + 分层 advantage
#
# `scripts/train/grpo/run_schemashift.sh` 通过 get() 函数读取本文件的参数值，
# 然后通过 hydra override 注入到 verl。修改本文件后无需同步 sh。
#
# MODE=direct（默认）：使用原始 Qwen3-4B 权重直接 GRPO
# MODE=cold：使用 SFT cold-start 权重 → grpo_cold.yaml
exp:
  name: schemashift_direct_v1   # 与 sh 的默认 EXP_NAME 一致

model:
  path: models/Qwen3-4B

data:
  train_file: data/grpo_train_replay.parquet
  val_file: data/grpo_val_replay.parquet
  max_prompt_length: 10240    # BFCL prompt 实测 p99≈8800（带工具 schema），需 10k+
  max_response_length: 4096

rollout:
  group_size: 1               # E4: 9 records/task × rollout.n=1（数据侧分层）
  max_turns: 5                # 交互式静态 replay 最大轮次
  agent_loop: schemashift_replay
  agent_loop_config: configs/agent_loop.yaml
  tensor_parallel_size: 1

actor:
  ppo_micro_batch_size_per_gpu: 3   # 与 sh 默认 MICRO_BATCH_PER_GPU 一致
  ppo_epochs: 1
  clip_ratio: 0.2
  use_kl_loss: true
  kl_loss_coef: 0.04
  loss_agg_mode: token-mean
  enable_gradient_checkpointing: true

algorithm:
  adv_estimator: schemashift_grpo
  norm_adv_by_std_in_grpo: true
  schemashift:
    beta: 0.25                # 与 sh 默认 BETA 一致；分层 z-score + global 残差

trainer:
  total_epochs: 1
  total_training_steps: 300
  save_freq: 50
  test_freq: 50
  val_before_train: true
  project_name: schemashift-grpo
